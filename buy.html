<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>تکمیل خرید</title>

<style>

body{
background:#008080;
font-family:tahoma;
}

.box{
width:500px;
margin:50px auto;
background:silver;
padding:20px;
border-top:2px solid white;
border-left:2px solid white;
border-right:2px solid #404040;
border-bottom:2px solid #404040;
}

h1{
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
font-size:16px;
}

textarea{
width:100%;
height:80px;
margin-top:5px;
}

.pay{
background:white;
padding:15px;
margin-top:20px;
border:1px solid #555;
}

button{
margin-top:20px;
width:100%;
padding:12px;
font-size:18px;
background:silver;
border-top:2px solid white;
border-left:2px solid white;
border-right:2px solid #404040;
border-bottom:2px solid #404040;
cursor:pointer;
}

button:active{
border-top:2px solid #404040;
border-left:2px solid #404040;
border-right:2px solid white;
border-bottom:2px solid white;
}

</style>

</head>

<body>

<div class="box">

<h1>🛒 تکمیل سفارش</h1>

<label>نام و نام خانوادگی</label>
<input type="text">

<label>شماره موبایل</label>
<input type="tel" placeholder="09xxxxxxxxx">

<label>آدرس</label>
<textarea></textarea>

<div class="pay">

<h3>پرداخت کارت به کارت</h3>

<p><b>شماره کارت:</b></p>

<h2>5894 6311 3267 1686</h2>

<p><b>به نام:</b></p>

<h3>محمد طاها کاوند</h3>

</div>

<button>ثبت سفارش</button>

</div>

</body>

</html>
